<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Redline Moto</title>
  <link rel="icon" href="images/logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --home-bg: #EFF6FF;
      /* Soft red-50 */
      --text-color: #0F172A;
    }

    [data-theme="dark"] {
      --home-bg: #0F172A;
      /* Deep Slate-900 */
      --text-color: #F8FAFC;
    }

    [data-theme="dark"] .card {
      background-color: #1E293B;
      border-color: #334155;
    }
    
    [data-theme="dark"] .card1 {
      background-color: black;
    }

    [data-theme="dark"] .title {
      color: white;
    }

    /* Dark mode input styling */
    [data-theme="dark"] input {
      background-color: #334155;
      border-color: #475569;
      color: white;
    }

    [data-theme="dark"] input::placeholder {
      color: #94A3B8;
    }

    body {
      background: var(--home-bg);
      color: var(--text-color);
      transition: background-color 0.4s, color 0.4s;
    }
    @media (max-width:450px)
{ .sign{
  height: fit-content !important;
  margin-top: -70px !important;
}
    }
  </style>
</head>

<body class="font-sans">

  <nav class="card w-full bg-white shadow-md transition-colors duration-300 border-b border-transparent">
    <div class="max-w-4xl mx-auto px-6 flex items-center justify-between h-16">
      <h1 class="text-2xl">
        <a href="index.html" class="title italic font-semibold text-[#D90429] ">
          <span class="text-black title"> REDLINE </span> MOTO
        </a>
      </h1>

      <div class="flex gap-4 text-xl">
        <button id="rtlToggle" class="title text-[#D90429] transition">⇄</button>
        <button id="theme-toggle" class="title text-[#D90429] transition">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>

    </div>
  </nav>

<div class="card1 min-h-screen bg-gray-100 flex justify-center items-center p-4 sm:p-8 lg:py-12 overflow-hidden lg:overflow-visible">
  
  <div class="sign w-full h-[calc(100dvh-2rem)] sm:h-auto max-w-6xl bg-white rounded-2xl shadow-2xl flex flex-col lg:flex-row items-stretch overflow-hidden mt-[-40px]">

    <div class="card flex-1 w-full p-4 sm:p-10 lg:p-12 flex flex-col justify-center bg-white">
      <div class="max-w-md mx-auto w-full">
        
        <div class="text-center mb-3 sm:mb-6">
            <h2 class="title text-xl sm:text-3xl font-bold mb-0.5 sm:mb-1 text-[#D90429]">
              Join the Pack
            </h2>
        </div>

        <form class="space-y-2 sm:space-y-4">
          
          <div>
            <label class="title block text-[10px] sm:text-sm font-semibold text-gray-700 sm:mb-1 uppercase tracking-wider sm:normal-case sm:tracking-normal">Full Name</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm sm:text-base">
                <i class="bi bi-person"></i>
              </span>
              <input type="text" placeholder="Alex Pandian"
                class="w-full py-2 sm:py-3.5 pl-10 sm:pl-12 pr-3 rounded-lg sm:rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500/20 focus:border-[#D90429] outline-none transition text-xs sm:text-base" required>
            </div>
          </div>

          <div>
            <label class="title block text-[10px] sm:text-sm font-semibold text-gray-700 sm:mb-1 uppercase tracking-wider sm:normal-case sm:tracking-normal">Email Address</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm sm:text-base">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" placeholder="ride@adventure.com"
                class="w-full py-2 sm:py-3.5 pl-10 sm:pl-12 pr-3 rounded-lg sm:rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500/20 focus:border-[#D90429] outline-none transition text-xs sm:text-base" required>
            </div>
          </div>

          <div>
            <label class="title block text-[10px] sm:text-sm font-semibold text-gray-700 sm:mb-1 uppercase tracking-wider sm:normal-case sm:tracking-normal">Password</label>
            <div class="relative w-full">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm sm:text-base">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" id="regPassword" placeholder="••••••••"
                class="w-full py-2 sm:py-3.5 pl-10 sm:pl-12 pr-10 sm:pr-12 rounded-lg sm:rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500/20 focus:border-[#D90429] outline-none transition text-xs sm:text-base" required>
              <button type="button" onclick="togglePassword('regPassword', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#D90429] focus:outline-none">
                <i class="bi bi-eye-slash"></i>
              </button>
            </div>
          </div>

          <div>
            <label class="title block text-[10px] sm:text-sm font-semibold text-gray-700 sm:mb-1 uppercase tracking-wider sm:normal-case sm:tracking-normal">Confirm Password</label>
            <div class="relative w-full">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm sm:text-base">
                <i class="bi bi-shield-check"></i>
              </span>
              <input type="password" id="regConfirmPassword" placeholder="••••••••"
                class="w-full py-2 sm:py-3.5 pl-10 sm:pl-12 pr-10 sm:pr-12 rounded-lg sm:rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500/20 focus:border-[#D90429] outline-none transition text-xs sm:text-base" required>
              <button type="button" onclick="togglePassword('regConfirmPassword', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#D90429] focus:outline-none">
                <i class="bi bi-eye-slash"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center gap-2 text-[11px] sm:text-sm pt-1">
            <input type="checkbox" id="terms" class="accent-[#D90429] w-3 h-3 sm:w-4 sm:h-4 cursor-pointer" required>
            <label for="terms" class="title cursor-pointer text-gray-600">I agree to the Terms & Conditions</label>
          </div>

          <button
            class="w-full bg-[#D90429] text-white py-2.5 sm:py-4 rounded-lg sm:rounded-xl font-bold transition duration-300 hover:bg-black border border-transparent hover:border-black shadow-lg shadow-red-500/20 hover:shadow-black/10 active:scale-[0.98] mt-2 sm:mt-6 text-sm sm:text-lg">
            Create Account
          </button>
        </form>
        
        <div class="my-3 sm:my-6 flex items-center">
          <hr class="flex-grow border-gray-100 dark:border-gray-600">
          <span class="px-3 sm:px-4 text-gray-400 text-[10px] sm:text-sm font-medium">Or continue with</span>
          <hr class="flex-grow border-gray-100 dark:border-gray-600">
        </div>

        <div class="grid grid-cols-3 gap-2 sm:gap-4">
          <button type="button" class="flex items-center justify-center gap-0 sm:gap-3 py-2 sm:py-3.5 border border-gray-200 dark:border-gray-600 rounded-lg sm:rounded-xl hover:bg-red-50 hover:text-[#D90429] transition duration-300 title group text-xs font-semibold">
            <i class="bi bi-google text-base sm:text-xl text-red-500"></i> 
            <span class="hidden sm:inline">Google</span>
          </button>
          <button type="button" class="flex items-center justify-center gap-0 sm:gap-3 py-2 sm:py-3.5 border border-gray-200 dark:border-gray-600 rounded-lg sm:rounded-xl hover:bg-red-50 hover:text-[#D90429] transition duration-300 title group text-xs font-semibold">
            <i class="bi bi-facebook text-base sm:text-xl text-blue-600"></i> 
            <span class="hidden sm:inline">Facebook</span>
          </button>
          <button type="button" class="flex items-center justify-center gap-0 sm:gap-3 py-2 sm:py-3.5 border border-gray-200 dark:border-gray-600 rounded-lg sm:rounded-xl hover:bg-red-50 hover:text-[#D90429] transition duration-300 title group text-xs font-semibold">
            <i class="bi bi-apple text-base sm:text-xl text-black"></i> 
            <span class="hidden sm:inline">Apple</span>
          </button>
        </div>

        <p class="title mt-3 sm:mt-6 text-center text-xs sm:text-sm text-gray-600">
          Already have an account?
          <a href="login.html" class="text-[#D90429] font-bold hover:underline decoration-2 underline-offset-4 ml-1">
            Login
          </a>
        </p>

      </div>
    </div>

    <div class="hidden lg:flex flex-1 w-full lg:w-1/2 relative bg-cover bg-center flex-col justify-end min-h-[600px]" 
         style="background-image: url('images/img12.avif');">
      
      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/10"></div>
      
      
      <div class="relative z-10 p-10 lg:p-14 text-white">
        <div class="inline-flex items-center px-4 py-1.5 bg-[#D90429] rounded-full text-xs font-bold uppercase tracking-wider mb-5">
           <i class="bi bi-geo-alt-fill mr-1.5"></i> Begin the Journey
        </div>
        <h3 class="text-4xl lg:text-5xl font-extrabold mb-4 leading-tight tracking-tight max-w-lg">
          Leave the map. <br>Find your path.
        </h3>
        <p class="text-gray-200 text-base lg:text-lg leading-relaxed max-w-md">
          Join thousands of riders worldwide. Create your profile to unlock hidden routes, share your adventures, and connect with the global adventure riding community.
        </p>
      </div>

    </div>

  </div>
</div>

  <script>

    // RTL Toggle
    const rtlToggle = document.getElementById('rtlToggle');
    rtlToggle.onclick = () => {
      document.documentElement.dir =
        document.documentElement.dir === "rtl" ? "ltr" : "rtl";
    }

    // Theme Toggle
    const btn = document.getElementById("theme-toggle");
    const saved = localStorage.getItem("theme");

    if (saved) {
      document.documentElement.dataset.theme = saved;
      btn.innerHTML = saved === "dark"
        ? '<i class="bi bi-sun-fill"></i>'
        : '<i class="bi bi-moon-fill"></i>';
    }

    btn.onclick = () => {
      let theme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = theme;
      localStorage.setItem("theme", theme);
      btn.innerHTML = theme === "dark"
        ? '<i class="bi bi-sun-fill"></i>'
        : '<i class="bi bi-moon-fill"></i>';
    }

    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'ui-sans-serif', 'system-ui'],
          },
        },
      },
    }

    // Toggle Password Visibility
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      }
    }

  </script>

</body>

</html>
